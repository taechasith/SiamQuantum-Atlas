<!DOCTYPE html>
<html lang="th" data-lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SiamQuantum Atlas{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07111f;
      --surface: rgba(8, 19, 39, 0.9);
      --surface-2: rgba(14, 28, 52, 0.78);
      --border: rgba(96, 165, 250, 0.24);
      --border-strong: rgba(245, 158, 11, 0.3);
      --text: #eff6ff;
      --muted: #b4c4e3;
      --accent: #60a5fa;
      --accent-2: #f59e0b;
      --ring: rgba(96, 165, 250, 0.38);
      --shadow: 0 26px 72px rgba(2, 8, 23, 0.34);
      --font-body: "Fira Sans", system-ui, sans-serif;
      --font-heading: "Fira Code", monospace;
      --font-mono: "Fira Code", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 20%),
        linear-gradient(180deg, #07111f 0%, #081427 52%, #07111f 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.58;
    }

    a, button, input, select, textarea { font: inherit; }

    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    nav {
      background: rgba(6, 14, 28, 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      text-decoration: none;
      color: var(--text);
      min-height: 44px;
    }

    .brand-mark {
      width: 2.25rem;
      height: 2.25rem;
      display: grid;
      place-items: center;
      border-radius: 0.9rem;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.18), rgba(245, 158, 11, 0.14));
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      font-family: var(--font-heading);
      font-size: 0.84rem;
      color: var(--accent);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
    }

    .brand-title {
      font-family: var(--font-heading);
      font-size: 0.98rem;
      color: var(--text);
    }

    .brand-subtitle {
      font-size: 0.73rem;
      color: var(--muted);
    }

    .nav-right {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.86rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: color .18s ease, background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(96, 165, 250, 0.08);
      border-color: var(--border);
      transform: translateY(-1px);
    }

    .nav-links a.active {
      color: var(--text);
      background: rgba(96, 165, 250, 0.12);
      border-color: var(--border-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ── Language toggle ── */
    .lang-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
      min-height: 36px;
      padding: 0 0.8rem;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .lang-btn.active {
      background: rgba(96, 165, 250, 0.15);
      color: var(--accent);
    }

    .lang-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    /* ── i18n visibility ── */
    html[data-lang="en"] .th-text { display: none !important; }
    html[data-lang="th"] .en-text { display: none !important; }

    @media (max-width: 820px) {
      nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-right {
        width: 100%;
        justify-content: flex-start;
      }

      .nav-links {
        justify-content: flex-start;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/">
      <span class="brand-mark">SQ</span>
      <span class="brand-copy">
        <span class="brand-title">SiamQuantum Atlas</span>
        <span class="brand-subtitle">
          <span class="th-text">พื้นที่วิจัยสัญญาณควอนตัมไทย</span>
          <span class="en-text">Thai Quantum Signals Workspace</span>
        </span>
      </span>
    </a>
    <div class="nav-right">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn" id="btn-th" type="button" aria-pressed="true" onclick="setLang('th')">TH</button>
        <button class="lang-btn" id="btn-en" type="button" aria-pressed="false" onclick="setLang('en')">EN</button>
      </div>
      <div class="nav-links">
        <a href="/" {% if active == 'home' %}class="active"{% endif %}>
          <span class="th-text">หน้าหลัก</span><span class="en-text">Home</span>
        </a>
        <a href="/dashboard" {% if active == 'dashboard' %}class="active"{% endif %}>
          <span class="th-text">แผนที่</span><span class="en-text">Map</span>
        </a>
        <a href="/network" {% if active == 'network' %}class="active"{% endif %}>
          <span class="th-text">เครือข่าย</span><span class="en-text">Network</span>
        </a>
        <a href="/analytics" {% if active == 'analytics' %}class="active"{% endif %}>
          <span class="th-text">สถิติ</span><span class="en-text">Analytics</span>
        </a>
        <a href="/database" {% if active == 'database' %}class="active"{% endif %}>
          <span class="th-text">ฐานข้อมูล</span><span class="en-text">Database</span>
        </a>
        <a href="/community" {% if active == 'community' %}class="active"{% endif %}>
          <span class="th-text">ชุมชน</span><span class="en-text">Community</span>
        </a>
      </div>
    </div>
  </nav>
  {% block body %}{% endblock %}
  <script>
    function setLang(lang) {
      document.documentElement.dataset.lang = lang;
      document.documentElement.lang = lang;
      localStorage.setItem('sq-lang', lang);
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      if (typeof onLangChange === 'function') onLangChange(lang);
    }
    (function () {
      var saved = localStorage.getItem('sq-lang') || 'th';
      setLang(saved);
    })();
  </script>
</body>
</html>
