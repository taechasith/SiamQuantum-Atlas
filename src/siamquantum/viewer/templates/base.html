<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SiamQuantum Atlas{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #050816; color: #f3f7ff; min-height: 100vh; }
    nav { background: rgba(5, 8, 22, 0.96); border-bottom: 1px solid rgba(112, 147, 255, 0.18); backdrop-filter: blur(16px); padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 52px; position: sticky; top: 0; z-index: 100; }
    nav .brand { font-weight: 700; font-size: 1rem; color: #70e1ff; text-decoration: none; letter-spacing: -0.01em; }
    nav a { color: #99a7d3; text-decoration: none; font-size: 0.875rem; padding: 0.25rem 0.6rem; border-radius: 8px; transition: color .15s, background .15s; }
    nav a:hover { color: #f3f7ff; background: rgba(112, 225, 255, 0.08); }
    nav a.active { color: #70e1ff; background: rgba(112, 225, 255, 0.12); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/dashboard">⚛ SiamQuantum Atlas</a>
    <a href="/dashboard" {% if active == 'dashboard' %}class="active"{% endif %}>แผนที่ / Map</a>
    <a href="/network"   {% if active == 'network'   %}class="active"{% endif %}>เครือข่าย / Network</a>
    <a href="/analytics" {% if active == 'analytics' %}class="active"{% endif %}>สถิติ / Analytics</a>
    <a href="/database"  {% if active == 'database'  %}class="active"{% endif %}>ฐานข้อมูล / Database</a>
    <a href="/community" {% if active == 'community' %}class="active"{% endif %}>ชุมชน / Community</a>
  </nav>
  {% block body %}{% endblock %}
</body>
</html>
